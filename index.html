</style></head><body><div class="app"><header><h1>時間の塊</h1></header>
<section class="card now"><div class="status" id="status"></div><div class="timer" id="timer">00:00:00</div><div class="run-start" id="runStartEditor" hidden><label>計測開始</label><input id="runStartDate" type="date"><input id="runStartTime" type="time"></div><div class="picker-title"><b>メイン色</b><button class="smallbtn" onclick="openProfiles('main')">＋ 登録・編集</button></div><div class="chips" id="mainPicker"></div><div class="picker-title"><b>サブ（押すとすぐ計測）</b><button class="smallbtn" onclick="openProfiles('sub')">一覧を編集</button></div><div class="sub-strip" id="subPicker"></div><div class="selection-wrap"><div class="selection"><button class="color-touch" id="previewMainButton" onclick="toggleSelectionPalette()"><span class="barswatch" id="previewMain"></span></button><div class="subswatch" id="previewSub"></div><div style="flex:1"><strong id="previewText" onclick="beginMainNameEdit()"></strong><input id="previewNameInput" hidden aria-label="メインの名前"><div class="meta" id="previewSubText"></div></div></div><div class="mini-palette" id="selectionPalette" hidden></div></div><button class="bigbtn" id="mainBtn">▶ スタート</button><div class="runmemo" id="runMemoWrap" hidden><input id="runMemo" placeholder="計測中の内訳・メモ（自動保存）"></div><details class="install"><summary><b>ホーム画面への置き方</b></summary><div class="hint">iPhoneのSafariで共有 →「ホーム画面に追加」。</div></details></section>
<section class="card"><div class="section-title"><h2>今日の時間バー</h2><button class="smallbtn danger" id="clearBtn">今日を全削除</button></div><div class="scale" id="timelineScale" aria-label="左右に動かして1日の始まりを変更"></div><div class="timeline-label"><span>メイン</span><span id="mainTotal"></span></div><div class="timeline" id="mainTimeline"></div><div class="timeline-label"><span>サブ</span><span id="subTotal"></span></div><div class="timeline" id="subTimeline"></div></section>
<section class="card"><div class="section-title"><h2>履歴の編集</h2><div class="row"><button class="smallbtn" id="addHistoryBtn">＋ 追加</button><button class="smallbtn" id="editLatestBtn">直前を編集</button></div></div><div class="inline-edit" id="addHistoryForm" hidden><div class="grid2"><div class="field"><label>メイン</label><button class="profile-pick" id="addMainPick"></button></div><div class="field"><label>サブ</label><button class="profile-pick" id="addSubPick"></button></div></div><div class="time-stack"><div class="field"><label>開始</label><div class="date-time-grid"><input id="addStartDate" type="date"><input id="addStartTime" type="time"></div></div><div class="field"><label>終了</label><div class="date-time-grid"><input id="addEndDate" type="date"><input id="addEndTime" type="time"></div></div></div><div class="edit-actions"><button class="smallbtn" id="saveAddedHistory">保存</button></div></div><div id="logs"></div></section>
<section class="card"><div class="section-title"><h2>時間グラフ</h2><span id="statsTotal" class="meta"></span></div><div class="stats-nav"><button class="smallbtn" id="statsPrev">‹ 前日</button><input id="statsDate" type="date"><button class="smallbtn" id="statsNext">翌日 ›</button></div><div class="stats-bar" id="statsBar"></div><div class="stats-subbar" id="statsSubBar"></div><div id="statsLegend"></div></section>
<section class="card"><div class="section-title"><h2>絞り込み</h2><button class="smallbtn" onclick="setFilter('all','all')">すべて</button></div><div class="filters" id="mainFilters"></div><div class="filters" id="subFilters" style="margin-top:5px"></div></section></div>
<dialog id="profilesDialog"><div class="dialog-inner"><div class="sticky-head"><h2 id="profilesTitle"></h2><button class="smallbtn" id="saveProfiles">保存</button></div><div class="new-box" id="mainNewBox"><b>＋ 新規追加</b><div style="height:7px"></div><input id="newName" placeholder="最初に名前を入力（空欄でも可）"><div class="palette" id="newPalette"></div><button class="smallbtn" id="addProfile">追加</button></div><hr class="divider" id="profileDivider"><b id="existingTitle">既存一覧</b><div id="profileList"></div></div></dialog>
<dialog id="newSubDialog"><div class="dialog-inner"><div class="sticky-head"><h2>サブを新規登録</h2><button class="smallbtn" id="saveNewSub">保存</button></div><div class="new-box"><input id="newSubName" placeholder="名前を入力"><div class="palette" id="newSubPalette"></div></div></div></dialog>
<dialog id="historyPickerDialog"><div class="dialog-inner"><div class="sticky-head"><h2 id="historyPickerTitle">選択</h2></div><div class="history-icon-grid" id="historyPickerGrid"></div></div></dialog>
<script>
const $=id=>document.getElementById(id),LOG_KEY="work_logs_v3",RUN_KEY="running_timer_v3",PROFILE_KEY="work_profiles_v3",SET_KEY="work_settings_v3";

const defaults={main:[{id:"blue",name:"青木さん",color:"#3777c8"},{id:"green",name:"漫画",color:"#3f9863"},{id:"orange",name:"仕事",color:"#d88738"},{id:"pink",name:"生活",color:"#c85e89"},...palette.slice(0,12).map((c,i)=>({id:"blank"+i,name:"",color:c}))],sub:[{id:"twitter",mainId:"blue",name:"Twitter",color:"#4f9be8",uses:0},{id:"movie",mainId:"blue",name:"映画",color:"#7459b8",uses:0},{id:"comment",mainId:"blue",name:"コメント",color:"#d05a79",uses:0},{id:"sleep",mainId:"pink",name:"寝起き",color:"#7893a8",uses:0}]};

let oldP=read("work_profiles_v2",null),profiles=read(PROFILE_KEY,null);if(!profiles){profiles=oldP||structuredClone(defaults);profiles.sub=(profiles.sub||[]).map(s=>({...s,mainId:s.mainId||profiles.main[0]?.id||"",uses:s.uses||0}));}
let logs=read(LOG_KEY,null);if(!logs)logs=read("work_logs_v2",read("work_logs_v1",[])).map(x=>({id:x.id||uid(),start:+x.start,end:+x.end,mainId:x.mainId||"",subId:x.subId||"",memo:x.memo??x.task??"",legacyColor:x.legacyColor||x.color}));
let running=read(RUN_KEY,null)||read("running_timer_v2",null),settings=read(SET_KEY,{dayStart:0});if(running&&!('memo'in running))running.memo="";
let selectedMain=running?.mainId||profiles.main[0]?.id||"",selectedSub=running?.subId||"",filterMain="all",filterSub="all",openEditId=null,profileMode="main",newColor="";
const pad=n=>String(n).padStart(2,"0"),esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])),fmtTime=t=>{let d=new Date(t);return pad(d.getHours())+":"+pad(d.getMinutes())},toLocal=t=>{let d=new Date(t);return new Date(t-d.getTimezoneOffset()*60000).toISOString().slice(0,16)},fmtTimer=ms=>{let s=Math.max(0,Math.floor(ms/1000));return pad(Math.floor(s/3600))+":"+pad(Math.floor(s%3600/60))+":"+pad(s%60)},fmtDur=ms=>{let m=Math.max(0,Math.floor(ms/60000)),h=Math.floor(m/60);return h?`${h}時間${m%60}分`:`${m}分`};

function statsBounds(){let value=$("statsDate").value,d=new Date(value+'T00:00');d.setMinutes(d.getMinutes()+(settings.dayStart||0));return{start:d.getTime(),end:d.getTime()+86400000}}
let statsExpandedMain="";
function renderStats(){if(!$("statsDate").value)return;let b=statsBounds(),list=logs.filter(l=>l.end>b.start&&l.end<=b.end),now=Date.now();if(running&&now>b.start&&now<=b.end)list.push({...running,end:now});let totals=new Map,subs=new Map;list.forEach(l=>{let ms=Math.max(0,l.end-l.start);totals.set(l.mainId,(totals.get(l.mainId)||0)+ms);if(!subs.has(l.mainId))subs.set(l.mainId,new Map);let sm=subs.get(l.mainId);sm.set(l.subId||"",(sm.get(l.subId||"")||0)+ms)});let items=[...totals].map(([id,ms])=>({p:getP('main',id),id,ms})).filter(x=>x.ms>0).sort((a,b)=>{let asleep=x=>String(x.p?.name||'').includes('睡眠')?1:0;return asleep(b)-asleep(a)||b.ms-a.ms}),total=items.reduce((n,x)=>n+x.ms,0),subItems=x=>[...(subs.get(x.id)||new Map)].map(([id,ms])=>({p:getP('sub',id),id,ms,color:getP('sub',id)?.color||x.p?.color||'#bbb'})).sort((a,b)=>(a.p?.order??999)-(b.p?.order??999)||b.ms-a.ms);$("statsTotal").textContent=total?`合計 ${fmtDur(total)}`:"記録なし";$("statsBar").innerHTML=items.map(x=>`<i class="stats-seg" title="${esc(x.p?.name||'名前なし')} ${fmtDur(x.ms)}" style="width:${x.ms/total*100}%;background:${x.p?.color||'#bbb'}"></i>`).join("");$("statsSubBar").innerHTML=items.map(x=>`<span class="stats-main-chunk" style="width:${x.ms/total*100}%">${subItems(x).map(s=>`<i class="stats-subseg" title="${esc(s.p?.name||'サブなし')} ${fmtDur(s.ms)}" style="width:${s.ms/x.ms*100}%;background:${s.color};${s.id?'':'opacity:.28'}"></i>`).join('')}</span>`).join('');$("statsLegend").innerHTML=items.map(x=>{let open=statsExpandedMain===x.id,rows=subItems(x);return `<div class="stats-row ${open?'open':''}"><i class="stats-dot" style="background:${x.p?.color||'#bbb'}"></i><button class="stats-name" onclick="toggleStatsMain('${x.id}')">${esc(x.p?.name||'名前なし')}</button><b>${fmtDur(x.ms)}</b>${open?`<div class="stats-sublist">${rows.map(s=>`<div class="stats-subrow"><i class="stats-subdot" style="background:${s.color};${s.id?'':'opacity:.35'}"></i><span>${esc(s.p?.name||'サブなし')}</span><b>${fmtDur(s.ms)}</b></div>`).join('')}</div>`:''}</div>`}).join("")}
function toggleStatsMain(id){statsExpandedMain=statsExpandedMain===id?'':id;renderStats()}
function shiftStats(days){let d=new Date($("statsDate").value+'T00:00');d.setDate(d.getDate()+days);$("statsDate").value=toLocal(d.getTime()).slice(0,10);renderStats()}
$("statsDate").value=toLocal(bounds().start).slice(0,10);$("statsDate").onchange=renderStats;$("statsPrev").onclick=()=>shiftStats(-1);$("statsNext").onclick=()=>shiftStats(1);
function renderAll(){renderMain();renderSubs();renderNow();renderFilters();renderDay();renderStats()}setInterval(()=>{renderNow();$("timelineScale").innerHTML=scaleHTML();renderTimeline('main');renderTimeline('sub');renderStats()},1000);renderAll();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');
</script></body></html>
