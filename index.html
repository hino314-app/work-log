<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#3f78c5">
<link rel="manifest" href="manifest.webmanifest">
<title>時間の塊</title>
<style>
:root{
  --bg:#f5f1eb;--card:#fffdf9;--text:#2e2925;--muted:#80766d;
  --line:#dfd6cd;--shadow:0 8px 24px rgba(63,49,40,.08)
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
button,input,select{font:inherit}
button{touch-action:manipulation}
.app{max-width:720px;margin:auto;padding:10px 10px 80px}
header{padding:8px 2px 4px}
h1{font-size:22px;margin:0}
.subtle{color:var(--muted);font-size:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:13px;margin-top:10px;box-shadow:var(--shadow)}
.row{display:flex;gap:8px;align-items:center}
.between{display:flex;justify-content:space-between;align-items:center;gap:8px}
.status{font-weight:800;font-size:14px}
.timer{font-size:37px;font-weight:900;letter-spacing:.02em;margin:2px 0 6px}
.now-clock{font-size:13px;color:var(--muted);font-weight:700}
.label{font-size:13px;font-weight:850;margin:12px 0 7px}
.main-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}
.main-btn,.sub-btn{border:2px solid transparent;background:white;box-shadow:0 1px 5px rgba(50,40,35,.10);font-weight:850}
.main-btn{border-radius:13px;min-height:54px;padding:5px;color:#2e2925}
.main-btn.active,.sub-btn.active{outline:3px solid #2d2925;outline-offset:1px}
.color-dot{width:24px;height:24px;border-radius:8px;margin:0 auto 3px}
.main-name,.sub-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-wrap{overflow-x:auto;padding:2px 2px 8px;scrollbar-width:thin}
.sub-grid{display:grid;grid-template-rows:repeat(2,44px);grid-auto-flow:column;grid-auto-columns:92px;gap:7px;width:max-content;min-width:100%}
.sub-btn{border-radius:12px;padding:4px 7px;display:flex;align-items:center;justify-content:center;gap:5px}
.sub-swatch{width:14px;height:26px;border-radius:5px;flex:none}
.start-btn{width:100%;border:0;border-radius:15px;padding:15px;margin-top:8px;color:white;background:#4b4a48;font-size:18px;font-weight:900}
.start-btn.stop{background:#4c4542}
.memo-live{margin-top:10px}
input[type=text]{width:100%;border:1px solid var(--line);border-radius:11px;background:white;padding:10px}
.small{border:1px solid var(--line);background:white;border-radius:10px;padding:7px 9px;font-weight:750}
.danger{color:#a13b38}
.day-control{user-select:none;-webkit-user-select:none;touch-action:pan-y;text-align:center;padding:9px 0 4px}
.day-time{display:inline-block;font-size:31px;font-weight:950;padding:8px 28px;border-radius:14px;background:#f2ece5;border:1px solid var(--line);cursor:ew-resize}
.day-hint{font-size:11px;color:var(--muted);margin-top:5px}
.timeline-head{display:flex;justify-content:space-between;align-items:end;margin:12px 1px 5px}
.timeline{position:relative;height:56px;background:#f2ebe4;border:1px solid var(--line);border-radius:13px;overflow:hidden}
.timeline::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 49.8%,rgba(90,75,65,.09) 50%,transparent 50.2%);pointer-events:none}
.segment{position:absolute;top:0;height:100%;min-width:2px;border:0;padding:0 2px;color:white;font-size:10px;font-weight:850;overflow:hidden;white-space:nowrap;text-shadow:0 1px 2px #3338}
.current-line{position:absolute;top:0;bottom:0;width:2px;background:#26221f;z-index:4;pointer-events:none}
.current-line::before{content:"";position:absolute;top:-1px;left:-3px;width:8px;height:8px;border-radius:50%;background:#26221f}
.edge-labels{display:flex;justify-content:space-between;color:var(--muted);font-size:10px;margin:3px 2px 0}
.history-item{border-top:1px solid var(--line);padding:11px 0}
.history-item:first-child{border-top:0}
.history-top{display:flex;gap:9px;align-items:flex-start;cursor:pointer}
.swatches{display:flex;gap:3px;padding-top:2px}
.swatch{width:14px;height:28px;border-radius:5px}
.hist-title{font-weight:900}
.hist-meta{font-size:12px;color:var(--muted);margin-top:2px}
.inline-editor{margin-top:10px;padding:10px;background:#f7f1eb;border-radius:13px;border:1px solid var(--line)}
.inline-editor label{font-size:11px;font-weight:800;color:var(--muted);display:block;margin-top:7px}
.inline-editor select,.inline-editor input[type=text]{width:100%;border:1px solid var(--line);border-radius:9px;background:white;padding:8px}
.range-row{margin-top:8px}
.range-row input[type=range]{width:100%;accent-color:#4a4a47}
.range-times{display:flex;justify-content:space-between;font-weight:800;font-size:12px}
.editor-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:10px}
.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
.stat{background:#f5efe9;border-radius:12px;padding:9px}
.stat b{display:block;font-size:13px}
.stat span{font-size:12px;color:var(--muted)}
.manage{margin-top:10px}
.manage summary{font-weight:850;cursor:pointer}
.manage-row{display:grid;grid-template-columns:45px 1fr auto;gap:7px;margin-top:7px}
.manage-row input[type=color]{width:45px;height:40px;padding:2px;border:1px solid var(--line);border-radius:9px;background:white}
.empty{color:var(--muted);text-align:center;padding:16px;font-size:13px}
@media(max-width:420px){
  .main-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .main-btn{min-height:50px}
}
</style>
</head>
<body>
<div class="app">
<header>
  <h1>時間の塊</h1>
  <div class="subtle">押したら始まる。あとで直せる。</div>
</header>

<section class="card">
  <div class="between">
    <div class="status" id="status">メインを選んでください</div>
    <div class="now-clock" id="nowClock"></div>
  </div>
  <div class="timer" id="timer">00:00:00</div>

  <div class="label">メイン</div>
  <div class="main-grid" id="mainGrid"></div>

  <div class="between">
    <div class="label" style="margin-bottom:7px">サブ</div>
    <button class="small" id="subManageBtn">＋ 登録</button>
  </div>
  <div class="sub-wrap"><div class="sub-grid" id="subGrid"></div></div>

  <button class="start-btn" id="startBtn">▶ スタート</button>

  <div class="memo-live" id="liveMemoWrap" hidden>
    <div class="label">計測中の内訳</div>
    <input type="text" id="liveMemo" placeholder="途中でも書けます（自動保存）">
  </div>
</section>

<section class="card">
  <div class="between">
    <b>1日の始まり</b>
    <span class="subtle">数字を左右に動かす</span>
  </div>
  <div class="day-control" id="dayControl">
    <div class="day-time" id="dayTime">08:00</div>
    <div class="day-hint">15分単位。左右にドラッグ／スワイプ</div>
  </div>

  <div class="timeline-head">
    <b>今日の時間バー</b>
    <span class="now-clock" id="timelineNow"></span>
  </div>
  <div class="timeline" id="timeline"></div>
  <div class="edge-labels"><span id="rangeStart"></span><span id="rangeEnd"></span></div>
  <div class="subtle" style="margin-top:6px">計測中の色もリアルタイムで伸びます。</div>
</section>

<section class="card">
  <div class="between"><b>今日の履歴</b><button class="small danger" id="clearToday">今日を削除</button></div>
  <div id="history"></div>
</section>

<section class="card">
  <b>今日の合計</b>
  <div class="stats" id="stats" style="margin-top:8px"></div>
</section>

<section class="card">
<details class="manage">
  <summary>メイン色・名前を編集</summary>
  <div id="mainManage"></div>
  <button class="small" id="addMain" style="margin-top:9px">＋ メイン追加</button>
</details>
</section>
</div>

<script>
const $=id=>document.getElementById(id);
const KEYS={profiles:"wl12_profiles",logs:"wl12_logs",running:"wl12_running",start:"wl12_day_start"};

const defaults=[
 {id:"life",name:"生活",color:"#c85e89",subs:[
  {id:"sleep",name:"寝る",color:"#735ca8"},
  {id:"brush",name:"歯磨き",color:"#5ca0b8"},
  {id:"meal",name:"ご飯",color:"#d78a3f"},
  {id:"bath",name:"風呂",color:"#4ca7a0"},
  {id:"drama",name:"ドラマ",color:"#8a68b1"}
 ]},
 {id:"house",name:"家事",color:"#d88738",subs:[
  {id:"cook",name:"料理",color:"#d56e42"},
  {id:"clean",name:"掃除",color:"#6c9b68"}
 ]},
 {id:"aoki",name:"青木さん",color:"#3777c8",subs:[
  {id:"twitter",name:"Twitter",color:"#4f8fd8"},
  {id:"comment",name:"コメント",color:"#6f7fd0"},
  {id:"commentmake",name:"コメント制作",color:"#7c67bd"}
 ]},
 {id:"manga",name:"漫画",color:"#3f9863",subs:[
  {id:"machida",name:"町田先生",color:"#4a8868"},
  {id:"hoshimi",name:"星見先生",color:"#65a479"}
 ]}
];

let profiles=load(KEYS.profiles,defaults);
let logs=load(KEYS.logs,[]);
let running=load(KEYS.running,null);
let dayStartMin=Number(localStorage.getItem(KEYS.start)??480);
let selectedMain=profiles[0]?.id||"";
let selectedSub="";
let openEditorId=null;

function clone(x){return JSON.parse(JSON.stringify(x))}
function load(key,fallback){try{let x=JSON.parse(localStorage.getItem(key));return x??clone(fallback)}catch{return clone(fallback)}}
function save(){
 localStorage.setItem(KEYS.profiles,JSON.stringify(profiles));
 localStorage.setItem(KEYS.logs,JSON.stringify(logs));
 localStorage.setItem(KEYS.running,JSON.stringify(running));
 localStorage.setItem(KEYS.start,String(dayStartMin));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s=""){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function pad(n){return String(n).padStart(2,"0")}
function fmtClock(ts){const d=new Date(ts);return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
function fmtDuration(ms){
 ms=Math.max(0,ms);const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
 return h?`${h}時間${m}分`:(m?`${m}分${ss?ss+"秒":""}`:`${ss}秒`);
}
function fmtTimer(ms){const s=Math.floor(Math.max(0,ms)/1000);return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`}
function mainBy(id){return profiles.find(x=>x.id===id)}
function subBy(mainId,subId){return mainBy(mainId)?.subs?.find(x=>x.id===subId)}
function dayBounds(ts=Date.now()){
 const d=new Date(ts);
 const start=new Date(d);start.setHours(0,0,0,0);start.setMinutes(dayStartMin);
 if(ts<start.getTime())start.setDate(start.getDate()-1);
 return {start:start.getTime(),end:start.getTime()+86400000};
}
function currentDayLogs(){
 const b=dayBounds();
 return logs.filter(l=>l.end>b.start&&l.start<b.end).sort((a,b)=>a.start-b.start);
}
function stopRunning(stopAt=Date.now()){
 if(!running)return;
 if(stopAt>running.start){
  logs.push({...running,id:uid(),end:stopAt});
 }
 running=null;save();
}
function startNew(mainId,subId=""){
 const now=Date.now();
 if(running)stopRunning(now);
 running={start:now,mainId,subId,memo:""};
 selectedMain=mainId;selectedSub=subId;
 save();renderAll();
}
function toggleStart(){
 if(running){stopRunning();renderAll();return}
 if(!selectedMain)return;
 startNew(selectedMain,selectedSub);
}

function renderMain(){
 $("mainGrid").innerHTML=profiles.map(m=>`
 <button class="main-btn ${selectedMain===m.id?"active":""}" data-id="${m.id}">
  <div class="color-dot" style="background:${m.color}"></div>
  <div class="main-name">${esc(m.name||"名前なし")}</div>
 </button>`).join("");
 [...$("mainGrid").children].forEach(b=>b.onclick=()=>{
  selectedMain=b.dataset.id;selectedSub="";renderAll();
 });
}
function renderSubs(){
 const m=mainBy(selectedMain);
 const subs=m?.subs||[];
 $("subGrid").innerHTML=subs.length?subs.map(s=>`
 <button class="sub-btn ${selectedSub===s.id?"active":""}" data-id="${s.id}">
  <span class="sub-swatch" style="background:${s.color}"></span>
  <span class="sub-name">${esc(s.name||"名前なし")}</span>
 </button>`).join(""):`<div class="empty">登録されたサブはありません</div>`;
 [...$("subGrid").querySelectorAll(".sub-btn")].forEach(b=>b.onclick=()=>{
  selectedSub=b.dataset.id;
  startNew(selectedMain,selectedSub);
 });
}
function renderRunning(){
 const m=running?mainBy(running.mainId):mainBy(selectedMain);
 const s=running?subBy(running.mainId,running.subId):subBy(selectedMain,selectedSub);
 $("status").textContent=running?`計測中：${m?.name||"名前なし"}${s?" ／ "+s.name:""}`:"メインを選んでください";
 $("timer").textContent=running?fmtTimer(Date.now()-running.start):"00:00:00";
 $("startBtn").textContent=running?"■ ストップ":"▶ スタート";
 $("startBtn").classList.toggle("stop",!!running);
 $("startBtn").style.background=m?.color||"#4b4a48";
 $("liveMemoWrap").hidden=!running;
 if(running&&document.activeElement!==$("liveMemo"))$("liveMemo").value=running.memo||"";
}
function renderDayControl(){
 $("dayTime").textContent=`${pad(Math.floor(dayStartMin/60)%24)}:${pad(dayStartMin%60)}`;
 const b=dayBounds();
 $("rangeStart").textContent=fmtClock(b.start);
 $("rangeEnd").textContent=`翌 ${fmtClock(b.end)}`;
}
function timelineSegment(log,b,ongoing=false){
 const end=ongoing?Date.now():log.end;
 const start=Math.max(log.start,b.start), clippedEnd=Math.min(end,b.end);
 if(clippedEnd<=start)return "";
 const left=(start-b.start)/86400000*100;
 const width=(clippedEnd-start)/86400000*100;
 const m=mainBy(log.mainId),s=subBy(log.mainId,log.subId);
 const color=s?.color||m?.color||"#888";
 const title=`${m?.name||""}${s?" / "+s.name:""} ${fmtClock(log.start)}〜${ongoing?"計測中":fmtClock(log.end)}`;
 return `<button class="segment" style="left:${left}%;width:${width}%;background:${color};z-index:${ongoing?3:2}" ${ongoing?"":`data-edit="${log.id}"`} title="${esc(title)}">${width>10?esc(s?.name||m?.name||""):""}</button>`;
}
function renderTimeline(){
 const b=dayBounds();
 let html=currentDayLogs().map(l=>timelineSegment(l,b)).join("");
 if(running&&running.start<b.end&&Date.now()>b.start)html+=timelineSegment(running,b,true);
 const now=Date.now();
 if(now>=b.start&&now<=b.end){
  html+=`<span class="current-line" style="left:${(now-b.start)/86400000*100}%"></span>`;
 }
 $("timeline").innerHTML=html;
 $("timelineNow").textContent=`現在 ${fmtClock(now)}`;
 [...$("timeline").querySelectorAll("[data-edit]")].forEach(b=>b.onclick=()=>{openEditorId=b.dataset.edit;renderHistory()});
}

function minuteInDay(ts,b){return Math.max(0,Math.min(1440,Math.round((ts-b.start)/60000)))}
function optionsMain(selected){return profiles.map(m=>`<option value="${m.id}" ${m.id===selected?"selected":""}>${esc(m.name||"名前なし")}</option>`).join("")}
function optionsSub(mainId,selected){return `<option value="">サブなし</option>`+(mainBy(mainId)?.subs||[]).map(s=>`<option value="${s.id}" ${s.id===selected?"selected":""}>${esc(s.name||"名前なし")}</option>`).join("")}

function renderHistory(){
 const b=dayBounds();
 const list=currentDayLogs().slice().reverse();
 if(!list.length){$("history").innerHTML=`<div class="empty">まだ履歴はありません</div>`;return}
 $("history").innerHTML=list.map(l=>{
  const m=mainBy(l.mainId),s=subBy(l.mainId,l.subId),open=openEditorId===l.id;
  const startMin=minuteInDay(l.start,b),endMin=minuteInDay(l.end,b);
  return `<div class="history-item" data-id="${l.id}">
   <div class="history-top" data-open="${l.id}">
    <div class="swatches"><span class="swatch" style="background:${m?.color||"#aaa"}"></span>${s?`<span class="swatch" style="background:${s.color}"></span>`:""}</div>
    <div style="flex:1">
     <div class="hist-title">${esc(m?.name||"名前なし")}${s?` ／ ${esc(s.name)}`:""}</div>
     <div class="hist-meta">${esc(l.memo||"内訳なし")}<br>${fmtClock(l.start)}〜${fmtClock(l.end)} ・ ${fmtDuration(l.end-l.start)}</div>
    </div>
    <button class="small">${open?"閉じる":"編集"}</button>
   </div>
   ${open?`<div class="inline-editor">
    <label>メイン</label><select class="edit-main">${optionsMain(l.mainId)}</select>
    <label>サブ</label><select class="edit-sub">${optionsSub(l.mainId,l.subId)}</select>
    <label>内訳</label><input type="text" class="edit-memo" value="${esc(l.memo||"")}">
    <div class="range-row">
      <div class="range-times"><span class="start-label">${fmtClock(l.start)}</span><span class="end-label">${fmtClock(l.end)}</span></div>
      <label>開始時間を横にスライド</label>
      <input class="range-start" type="range" min="0" max="1439" step="1" value="${startMin}">
      <label>終了時間を横にスライド</label>
      <input class="range-end" type="range" min="1" max="1440" step="1" value="${endMin}">
    </div>
    <div class="editor-actions"><button class="small danger delete-log">削除</button><button class="small save-edit">保存</button></div>
   </div>`:""}
  </div>`;
 }).join("");

 [...$("history").querySelectorAll("[data-open]")].forEach(el=>el.onclick=e=>{
  if(e.target.closest("button")||e.currentTarget===null){}
  const id=el.dataset.open;openEditorId=openEditorId===id?null:id;renderHistory();
 });
 const item=$("history").querySelector(".history-item .inline-editor");
 if(item){
  const wrap=item.closest(".history-item"),id=wrap.dataset.id,l=logs.find(x=>x.id===id);
  const mainSel=item.querySelector(".edit-main"),subSel=item.querySelector(".edit-sub");
  mainSel.onchange=()=>{subSel.innerHTML=optionsSub(mainSel.value,"")};
  const rs=item.querySelector(".range-start"),re=item.querySelector(".range-end");
  const updateLabels=()=>{
   if(Number(rs.value)>=Number(re.value)) {
    if(document.activeElement===rs) re.value=Math.min(1440,Number(rs.value)+1);
    else rs.value=Math.max(0,Number(re.value)-1);
   }
   item.querySelector(".start-label").textContent=fmtClock(b.start+Number(rs.value)*60000);
   item.querySelector(".end-label").textContent=fmtClock(b.start+Number(re.value)*60000);
  };
  rs.oninput=updateLabels;re.oninput=updateLabels;
  item.querySelector(".save-edit").onclick=()=>{
   l.mainId=mainSel.value;l.subId=subSel.value;l.memo=item.querySelector(".edit-memo").value;
   l.start=b.start+Number(rs.value)*60000;l.end=b.start+Number(re.value)*60000;
   if(l.end<=l.start)l.end=l.start+60000;
   save();renderAll();
  };
  item.querySelector(".delete-log").onclick=()=>{
   logs=logs.filter(x=>x.id!==id);openEditorId=null;save();renderAll();
  };
 }
}
function renderStats(){
 const totals={};
 currentDayLogs().forEach(l=>totals[l.mainId]=(totals[l.mainId]||0)+(l.end-l.start));
 if(running){
  const b=dayBounds();if(running.start<b.end&&Date.now()>b.start)totals[running.mainId]=(totals[running.mainId]||0)+(Date.now()-Math.max(running.start,b.start));
 }
 const rows=profiles.filter(m=>totals[m.id]).sort((a,b)=>totals[b.id]-totals[a.id]);
 $("stats").innerHTML=rows.length?rows.map(m=>`<div class="stat"><b>${esc(m.name||"名前なし")}</b><span>${fmtDuration(totals[m.id])}</span></div>`).join(""):`<div class="empty" style="grid-column:1/-1">まだ記録はありません</div>`;
}
function renderManage(){
 $("mainManage").innerHTML=profiles.map(m=>`<div class="manage-row" data-id="${m.id}">
 <input type="color" value="${m.color}">
 <input type="text" value="${esc(m.name)}" placeholder="名前">
 <button class="small danger">削除</button>
 </div>`).join("");
 [...$("mainManage").querySelectorAll(".manage-row")].forEach(row=>{
  const m=mainBy(row.dataset.id),inputs=row.querySelectorAll("input");
  inputs[0].oninput=()=>{m.color=inputs[0].value;save();renderMain();renderTimeline()};
  inputs[1].onchange=()=>{m.name=inputs[1].value;save();renderAll()};
  row.querySelector("button").onclick=()=>{profiles=profiles.filter(x=>x.id!==m.id);if(selectedMain===m.id)selectedMain=profiles[0]?.id||"";save();renderAll()};
 });
}
function openSubManager(){
 const m=mainBy(selectedMain);if(!m)return;
 const text=prompt(`${m.name}の新しいサブ名`);
 if(text===null||!text.trim())return;
 const color=prompt("色（例 #4ca7a0）",m.color)||m.color;
 m.subs=m.subs||[];m.subs.push({id:uid(),name:text.trim(),color:/^#[0-9a-f]{6}$/i.test(color)?color:m.color});
 save();renderAll();
}
function renderAll(){
 renderMain();renderSubs();renderRunning();renderDayControl();renderTimeline();renderHistory();renderStats();renderManage();
}

$("startBtn").onclick=toggleStart;
$("liveMemo").oninput=()=>{if(running){running.memo=$("liveMemo").value;save()}};
$("subManageBtn").onclick=openSubManager;
$("addMain").onclick=()=>{
 profiles.push({id:uid(),name:"",color:"#7a8794",subs:[]});selectedMain=profiles.at(-1).id;save();renderAll();
};
$("clearToday").onclick=()=>{
 if(!confirm("今日の履歴をすべて削除しますか？"))return;
 const b=dayBounds();logs=logs.filter(l=>!(l.end>b.start&&l.start<b.end));save();renderAll();
};

let dragStartX=null,dragStartValue=0,lastStep=null;
function beginDrag(x){dragStartX=x;dragStartValue=dayStartMin;lastStep=null}
function moveDrag(x){
 if(dragStartX===null)return;
 const steps=Math.round((x-dragStartX)/18);
 if(steps===lastStep)return;
 lastStep=steps;
 dayStartMin=(dragStartValue+steps*15)%1440;if(dayStartMin<0)dayStartMin+=1440;
 save();renderDayControl();renderTimeline();renderHistory();renderStats();
}
function endDrag(){dragStartX=null;lastStep=null}
$("dayControl").addEventListener("pointerdown",e=>{$("dayControl").setPointerCapture(e.pointerId);beginDrag(e.clientX)});
$("dayControl").addEventListener("pointermove",e=>moveDrag(e.clientX));
$("dayControl").addEventListener("pointerup",endDrag);
$("dayControl").addEventListener("pointercancel",endDrag);

setInterval(()=>{
 $("nowClock").textContent=`現在 ${fmtClock(Date.now())}`;
 renderRunning();renderTimeline();renderStats();
},1000);

renderAll();
$("nowClock").textContent=`現在 ${fmtClock(Date.now())}`;

if("serviceWorker" in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
</body>
</html>
