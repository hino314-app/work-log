<style>

</style></head><body><div class="app"><header><h1>時間の塊</h1></header>
<section class="card now"><div class="status" id="status"></div><div class="timer" id="timer">00:00:00</div><div class="picker-title"><b>メイン色</b><button class="smallbtn" onclick="openProfiles('main')">＋ 登録・編集</button></div><div class="chips" id="mainPicker"></div><div class="picker-title"><b>サブ（押すとすぐ計測）</b><button class="smallbtn" onclick="openProfiles('sub')">一覧を編集</button></div><div class="sub-strip" id="subPicker"></div><div class="selection"><div class="barswatch" id="previewMain"></div><div class="subswatch" id="previewSub"></div><div><strong id="previewText"></strong><div class="meta" id="previewSubText"></div></div></div><button class="bigbtn" id="mainBtn">▶ スタート</button><div class="runmemo" id="runMemoWrap" hidden><input id="runMemo" placeholder="計測中の内訳・メモ（自動保存）"></div><details class="install"><summary><b>ホーム画面への置き方</b></summary><div class="hint">iPhoneのSafariで共有 →「ホーム画面に追加」。</div></details></section>
<section class="card"><div class="section-title"><h2>今日の時間バー</h2><button class="smallbtn danger" id="clearBtn">今日を全削除</button></div><div class="day-control"><span class="hint">目盛りの近くを左右に動かせます</span><div class="day-swipe" id="daySwipe">1日の始まり <span id="dayStartText"></span></div></div><div class="scale" id="timelineScale"></div><div class="timeline-label"><span>メイン</span><span id="mainTotal"></span></div><div class="timeline" id="mainTimeline"></div><div class="timeline-label"><span>サブ</span><span id="subTotal"></span></div><div class="timeline" id="subTimeline"></div></section>
<section class="card"><div class="section-title"><h2>絞り込み</h2><button class="smallbtn" onclick="setFilter('all','all')">すべて</button></div><div class="filters" id="mainFilters"></div><div class="filters" id="subFilters" style="margin-top:5px"></div></section>
<section class="card"><div class="section-title"><h2>今日の履歴</h2><button class="smallbtn" id="editLatestBtn">直前を編集</button></div><div id="logs"></div></section></div>
<dialog id="profilesDialog"><div class="dialog-inner"><h2 id="profilesTitle"></h2><div class="new-box"><b>＋ 新規追加</b><div style="height:7px"></div><input id="newName" placeholder="最初に名前を入力（空欄でも可）"><div class="palette" id="newPalette"></div><button class="smallbtn" id="addProfile">保存</button></div><hr class="divider"><b>既存一覧</b><div id="profileList"></div><div class="dialog-actions"><button class="smallbtn" onclick="document.getElementById('profilesDialog').close()">閉じる</button><button class="smallbtn" id="saveProfiles">変更を保存</button></div></div></dialog>
<script>
const $=id=>document.getElementById(id),LOG_KEY="work_logs_v3",RUN_KEY="running_timer_v3",PROFILE_KEY="work_profiles_v3",SET_KEY="work_settings_v3";
const palette=["#D95C58","#D8AD3F","#45AEB0","#8066B6","#8EBB4A","#496B9B","#E07A5F","#6FBFA7","#A58BC6","#C85E89","#3777C8","#3F9863","#94715E","#75808C","#4A4A4A","#F0A3B8"];
const defaults={main:[{id:"blue",name:"青木さん",color:"#3777c8"},{id:"green",name:"漫画",color:"#3f9863"},{id:"orange",name:"仕事",color:"#d88738"},{id:"pink",name:"生活",color:"#c85e89"},...palette.slice(0,12).map((c,i)=>({id:"blank"+i,name:"",color:c}))],sub:[{id:"twitter",mainId:"blue",name:"Twitter",color:"#4f9be8",uses:0},{id:"movie",mainId:"blue",name:"映画",color:"#7459b8",uses:0},{id:"comment",mainId:"blue",name:"コメント",color:"#d05a79",uses:0},{id:"sleep",mainId:"pink",name:"寝起き",color:"#7893a8",uses:0}]};
const read=(k,f)=>{try{return JSON.parse(localStorage.getItem(k)||"null")??f}catch{return f}},uid=()=>crypto.randomUUID?.()||String(Date.now()+Math.random());
let oldP=read("work_profiles_v2",null),profiles=read(PROFILE_KEY,null);if(!profiles){profiles=oldP||structuredClone(defaults);profiles.sub=(profiles.sub||[]).map(s=>({...s,mainId:s.mainId||profiles.main[0]?.id||"",uses:s.uses||0}));}
let logs=read(LOG_KEY,null);if(!logs)logs=read("work_logs_v2",read("work_logs_v1",[])).map(x=>({id:x.id||uid(),start:+x.start,end:+x.end,mainId:x.mainId||"",subId:x.subId||"",memo:x.memo??x.task??"",legacyColor:x.legacyColor||x.color}));
let running=read(RUN_KEY,null)||read("running_timer_v2",null),settings=read(SET_KEY,{dayStart:0});if(running&&!('memo'in running))running.memo="";
let selectedMain=running?.mainId||profiles.main[0]?.id||"",selectedSub=running?.subId||"",filterMain="all",filterSub="all",openEditId=null,profileMode="main",newColor="";
const pad=n=>String(n).padStart(2,"0"),esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c])),fmtTime=t=>{let d=new Date(t);return pad(d.getHours())+":"+pad(d.getMinutes())},fmtTimer=ms=>{let s=Math.max(0,Math.floor(ms/1000));return pad(Math.floor(s/3600))+":"+pad(Math.floor(s%3600/60))+":"+pad(s%60)},fmtDur=ms=>{let m=Math.max(0,Math.floor(ms/60000)),h=Math.floor(m/60);return h?`${h}時間${m%60}分`:`${m}分`};
function save(){localStorage.setItem(LOG_KEY,JSON.stringify(logs));localStorage.setItem(PROFILE_KEY,JSON.stringify(profiles));localStorage.setItem(SET_KEY,JSON.stringify(settings));running?localStorage.setItem(RUN_KEY,JSON.stringify(running)):localStorage.removeItem(RUN_KEY)}
const getP=(k,id,l)=>profiles[k].find(p=>p.id===id)||(id?.startsWith("legacy_")?{id,name:"旧データ",color:l?.legacyColor||"#888"}:null);
function bounds(ts=Date.now()){let d=new Date(ts),mins=d.getHours()*60+d.getMinutes(),off=settings.dayStart||0;if(mins<off)d.setDate(d.getDate()-1);d.setHours(0,0,0,0);let start=d.getTime()+off*60000;return{start,end:start+86400000}}
function dayLogs(){let b=bounds();return logs.filter(l=>l.end>b.start&&l.start<b.end).sort((a,b)=>a.start-b.start)}
function visibleLogs(){return dayLogs().filter(l=>(filterMain==="all"||l.mainId===filterMain)&&(filterSub==="all"||l.subId===filterSub))}
function renderMain(){let latest=new Map;[...logs,...(running?[{...running,end:Date.now()}]:[])].forEach(l=>latest.set(l.mainId,Math.max(latest.get(l.mainId)||0,l.start||0)));let arr=profiles.main.map((p,i)=>({p,i,t:latest.get(p.id)||0})).sort((a,b)=>b.t-a.t||a.i-b.i).map(x=>x.p);$("mainPicker").innerHTML=arr.map(p=>`<button class="chip ${p.id===selectedMain?'selected':''}" data-id="${p.id}"><span class="disc" style="background:${p.color}"></span>${p.name?`<span class="chip-label">${esc(p.name)}</span>`:""}</button>`).join("");$("mainPicker").querySelectorAll("button").forEach(b=>b.onclick=()=>{selectedMain=b.dataset.id;selectedSub="";renderAll()})}
function subsForMain(){return profiles.sub.filter(s=>s.mainId===selectedMain).sort((a,b)=>(b.uses||0)-(a.uses||0)||String(a.name).localeCompare(String(b.name),"ja"))}
function renderSubs(){$("subPicker").innerHTML=`<button class="sub-chip add" id="quickAdd">＋新規</button>`+subsForMain().map(s=>`<button class="sub-chip ${running?.subId===s.id?'running':''}" data-id="${s.id}"><span class="disc" style="background:${s.color}"></span><span>${esc(s.name||"名前なし")}</span></button>`).join("");$("quickAdd").onclick=()=>openProfiles("sub");$("subPicker").querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>switchToSub(b.dataset.id))}
function finishRunning(now=Date.now()){if(!running)return;logs.push({id:uid(),start:+running.start,end:now,mainId:running.mainId,subId:running.subId||"",memo:running.memo||""});running=null}
function switchToSub(id){let s=getP("sub",id);if(!s)return;let now=Date.now();finishRunning(now);selectedMain=s.mainId;selectedSub=id;s.uses=(s.uses||0)+1;running={start:now,mainId:s.mainId,subId:id,memo:""};save();renderAll()}
function startTimer(){if(!selectedMain)return;running={start:Date.now(),mainId:selectedMain,subId:selectedSub,memo:""};save();renderAll()}function stopTimer(){finishRunning();selectedSub="";save();renderAll()}
function renderNow(){let m=getP("main",running?.mainId||selectedMain,running),s=getP("sub",running?.subId||selectedSub,running);$("previewMain").style.background=m?.color||"#888";$("previewSub").style.background=s?.color||"transparent";$("previewSub").style.opacity=s?1:.15;$("previewText").textContent=m?.name||"名前なし";$("previewSubText").textContent=s?"サブ："+(s.name||"名前なし"):"サブなし";$("mainBtn").style.background=m?.color||"#555";$("runMemoWrap").hidden=!running;if(running){$("status").textContent=`計測中　${fmtTime(running.start)}開始`;$("timer").textContent=fmtTimer(Date.now()-running.start);$("mainBtn").textContent="■ ストップ";if(document.activeElement!==$("runMemo"))$("runMemo").value=running.memo||""}else{$("status").textContent="メインを選んでスタート、またはサブをタップ";$("timer").textContent="00:00:00";$("mainBtn").textContent="▶ スタート"}}
function scaleHTML(){let b=bounds(),now=Date.now(),labels=new Set([0,360,720,1080,1440]);let pos=(now-b.start)/60000;if(pos>=0&&pos<=1440)for(let d=-4;d<=2;d++)labels.add(Math.round(pos/60)*60+d*60);return[...labels].filter(x=>x>=0&&x<=1440).sort((a,b)=>a-b).map(x=>{let t=new Date(b.start+x*60000),is=Math.abs(x-pos)<45;return `<span class="${is?'now-label':''}" style="left:${x/14.4}%">${t.getHours()}時</span>`}).join("")}
function renderTimeline(kind){let list=visibleLogs(),b=bounds(),now=Date.now();if(running&&running.start<b.end&&now>b.start)list=[...list,{...running,id:"running",end:now}];if(kind==="sub")list=list.filter(l=>l.subId);let total=list.reduce((z,l)=>z+Math.max(0,Math.min(l.end,b.end)-Math.max(l.start,b.start)),0);$(kind+"Total").textContent=total?fmtDur(total):"";let guides=Array.from({length:25},(_,i)=>`<i class="guide" style="left:${i/24*100}%"></i>`).join(""),nl=now>b.start&&now<b.end?`<i class="now-line" style="left:${(now-b.start)/864000}%"></i>`:"";let segs=list.map(l=>{let st=Math.max(l.start,b.start),en=Math.min(l.end,b.end),w=(en-st)/864000,lft=(st-b.start)/864000,p=getP(kind,l[kind+"Id"],l);return en>st?`<button class="seg" style="left:${lft}%;width:${w}%;background:${p?.color||'#bbb'}" ${l.id==='running'?'':`onclick="openInline('${l.id}')"`}>${w>9?fmtTime(l.start):""}</button>`:""}).join("");$(kind+"Timeline").innerHTML=guides+segs+nl}
function renderFilters(){$("mainFilters").innerHTML=[{id:"all",name:"すべて",color:"#aaa"},...profiles.main].map(p=>`<button class="filter ${filterMain===p.id?'active':''}" onclick="setFilter('${p.id}',null)"><i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:4px"></i>${esc(p.name||"名前なし")}</button>`).join("");$("subFilters").innerHTML=[{id:"all",name:"すべて",color:"#aaa"},...profiles.sub].map(p=>`<button class="filter ${filterSub===p.id?'active':''}" onclick="setFilter(null,'${p.id}')"><i style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:4px"></i>${esc(p.name||"名前なし")}</button>`).join("")}
function editHTML(l){let b=bounds(l.start),startMin=Math.max(0,Math.min(1439,Math.round((l.start-b.start)/60000))),endMin=Math.max(1,Math.min(1440,Math.round((l.end-b.start)/60000))),subs=profiles.sub.filter(s=>s.mainId===l.mainId);return `<div class="inline-edit" onclick="event.stopPropagation()"><div class="field"><label>メモ・内訳（入力すると自動保存）</label><textarea id="eMemo">${esc(l.memo||"")}</textarea></div><div class="grid2"><div class="field"><label>メイン</label><select id="eMain">${profiles.main.map(p=>`<option value="${p.id}" ${p.id===l.mainId?'selected':''}>${esc(p.name||'名前なし')}</option>`).join('')}</select></div><div class="field"><label>サブ</label><select id="eSub"><option value="">なし</option>${subs.map(p=>`<option value="${p.id}" ${p.id===l.subId?'selected':''}>${esc(p.name||'名前なし')}</option>`).join('')}</select></div></div><div class="field"><label>開始</label><div class="range-row"><span id="eStartT">${fmtTime(l.start)}</span><input id="eStart" type="range" min="0" max="1439" step="1" value="${startMin}"><span></span></div></div><div class="field"><label>終了</label><div class="range-row"><span id="eEndT">${fmtTime(l.end)}</span><input id="eEnd" type="range" min="1" max="1440" step="1" value="${endMin}"><span></span></div></div><div class="edit-actions"><button class="smallbtn danger" onclick="deleteLog('${l.id}')">削除</button><button class="smallbtn" onclick="closeInline()">閉じる</button></div></div>`}
function renderLogs(){let list=visibleLogs().slice().reverse();$("logs").innerHTML=list.length?list.map(l=>{let m=getP("main",l.mainId,l),s=getP("sub",l.subId,l);return `<div class="log"><div class="log-summary" onclick="openInline('${l.id}')"><div class="swatches"><i class="swatch" style="background:${m?.color||'#bbb'}"></i>${s?`<i class="swatch" style="background:${s.color}"></i>`:''}</div><div><div class="log-title">${esc(m?.name||'名前なし')}${s?' ／ '+esc(s.name||'名前なし'):''}</div><div class="meta">${esc(l.memo||'内訳なし')}<br>${fmtTime(l.start)}〜${fmtTime(l.end)} ・ ${fmtDur(l.end-l.start)}</div></div></div>${openEditId===l.id?editHTML(l):''}</div>`}).join(""):'<div class="empty">まだ履歴なし</div>';if(openEditId)bindInline()}
function bindInline(){let l=logs.find(x=>x.id===openEditId);if(!l)return;let b=bounds(l.start),commit=()=>{save();renderTimeline('main');renderTimeline('sub')};$("eMemo").oninput=e=>{l.memo=e.target.value;commit()};$("eMain").onchange=e=>{l.mainId=e.target.value;l.subId="";save();renderAll()};$("eSub").onchange=e=>{l.subId=e.target.value;commit()};let change=(kind)=>e=>{let v=+e.target.value,t=b.start+v*60000;if(kind==='start'&&t<l.end)l.start=t;if(kind==='end'&&t>l.start)l.end=t;$(kind==='start'?'eStartT':'eEndT').textContent=fmtTime(kind==='start'?l.start:l.end);commit()};$("eStart").oninput=change('start');$("eEnd").oninput=change('end')}
function openInline(id){openEditId=openEditId===id?null:id;renderLogs()}function closeInline(){openEditId=null;renderLogs()}function deleteLog(id){if(confirm("この記録を削除しますか？")){logs=logs.filter(l=>l.id!==id);openEditId=null;save();renderAll()}}function setFilter(m,s){if(m!==null)filterMain=m;if(s!==null)filterSub=s;renderAll()}
function paletteHTML(selected){return palette.map(c=>`<button style="background:${c}" class="${selected===c?'selected':''}" data-color="${c}" aria-label="${c}"></button>`).join("")}
function openProfiles(mode){profileMode=mode;newColor="";$("profilesTitle").textContent=(mode==='main'?'メイン':'サブ')+'の登録・編集';$("newName").value="";$("newPalette").innerHTML=paletteHTML("");bindPalette($("newPalette"),c=>{newColor=c});renderProfileRows();$("profilesDialog").showModal()}
function bindPalette(root,cb){root.querySelectorAll("button").forEach(b=>b.onclick=()=>{root.querySelectorAll("button").forEach(x=>x.classList.remove('selected'));b.classList.add('selected');cb(b.dataset.color)})}
function renderProfileRows(){let arr=profileMode==='sub'?profiles.sub.filter(s=>s.mainId===selectedMain):profiles.main;$("profileList").innerHTML=arr.map(p=>`<div class="profile-row" data-id="${p.id}"><input class="pname" value="${esc(p.name)}" placeholder="名前なしでもOK"><div class="palette">${paletteHTML(p.color)}</div><div class="row"><button class="smallbtn danger remove">削除</button></div></div>`).join("");$("profileList").querySelectorAll('.profile-row').forEach(row=>{let p=profiles[profileMode].find(x=>x.id===row.dataset.id);bindPalette(row.querySelector('.palette'),c=>p.color=c);row.querySelector('.remove').onclick=()=>{if(confirm('削除しますか？')){profiles[profileMode]=profiles[profileMode].filter(x=>x.id!==p.id);renderProfileRows()}}})}
$("addProfile").onclick=()=>{let color=newColor||(profileMode==='sub'?getP('main',selectedMain)?.color:palette[profiles.main.length%palette.length])||'#888';let p={id:uid(),name:$("newName").value.trim(),color};if(profileMode==='sub'){p.mainId=selectedMain;p.uses=1;profiles.sub.push(p);finishRunning();selectedSub=p.id;running={start:Date.now(),mainId:selectedMain,subId:p.id,memo:""};save();$("profilesDialog").close();renderAll()}else{profiles.main.push(p);selectedMain=p.id;save();$("newName").value="";newColor="";$("newPalette").innerHTML=paletteHTML('');bindPalette($("newPalette"),c=>newColor=c);renderProfileRows();renderAll()}};
$("saveProfiles").onclick=()=>{$("profileList").querySelectorAll('.profile-row').forEach(row=>{let p=profiles[profileMode].find(x=>x.id===row.dataset.id);if(p)p.name=row.querySelector('.pname').value.trim()});if(!getP('main',selectedMain))selectedMain=profiles.main[0]?.id||'';if(selectedSub&&!getP('sub',selectedSub))selectedSub='';save();$("profilesDialog").close();renderAll()};
$("mainBtn").onclick=()=>running?stopTimer():startTimer();$("runMemo").oninput=e=>{if(running){running.memo=e.target.value;save()}};$("clearBtn").onclick=()=>{if(confirm("表示中の1日分を全部削除しますか？")){let b=bounds();logs=logs.filter(l=>!(l.end>b.start&&l.start<b.end));save();renderAll()}};$("editLatestBtn").onclick=()=>{let a=dayLogs();if(a.length)openInline(a[a.length-1].id)};
let drag=null;$("daySwipe").onpointerdown=e=>{drag={x:e.clientX,start:settings.dayStart};e.currentTarget.setPointerCapture(e.pointerId)};$("daySwipe").onpointermove=e=>{if(!drag)return;let steps=Math.round((e.clientX-drag.x)/12),v=(drag.start+steps*15)%1440;if(v<0)v+=1440;settings.dayStart=v;save();renderDay()};$("daySwipe").onpointerup=$("daySwipe").onpointercancel=()=>drag=null;
function renderDay(){$("dayStartText").textContent=pad(Math.floor(settings.dayStart/60))+":"+pad(settings.dayStart%60);$("timelineScale").innerHTML=scaleHTML();renderTimeline('main');renderTimeline('sub');renderLogs()}
function renderAll(){renderMain();renderSubs();renderNow();renderFilters();renderDay()}setInterval(()=>{renderNow();$("timelineScale").innerHTML=scaleHTML();renderTimeline('main');renderTimeline('sub')},1000);renderAll();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js');
</script></body></html>
