<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>作業記録</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#f7f3ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="作業記録">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
:root{--card:#fffaf4;--text:#2c2520;--muted:#7b6d62;--line:#eadfd3;--accent:#4b3f36;--danger:#b94b4b;--shadow:0 10px 30px rgba(67,48,32,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,"Hiragino Sans","Yu Gothic",sans-serif;background:linear-gradient(180deg,#fbf7f2 0%,#f1e8df 100%);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{max-width:720px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 14px calc(70px + env(safe-area-inset-bottom))}
header{padding:10px 4px 18px}h1{margin:0;font-size:26px}.sub{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.6}
.card{background:rgba(255,250,244,.94);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.now{text-align:center}.status{font-size:14px;color:var(--muted);margin-bottom:8px}.timer{font-variant-numeric:tabular-nums;font-size:42px;font-weight:800;letter-spacing:.04em;margin:6px 0 12px}
button{font-family:inherit;cursor:pointer}.bigbtn{width:100%;border:0;border-radius:22px;padding:18px 16px;font-size:24px;font-weight:800;color:white;background:var(--accent);box-shadow:0 12px 22px rgba(50,38,28,.22)}.bigbtn.stop{background:var(--danger)}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.colors{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:12px 0 14px}.color{height:44px;border-radius:14px;border:3px solid transparent;cursor:pointer}.color.selected{border-color:#2b211a;transform:scale(1.04)}
input{width:100%;border:1px solid var(--line);background:white;color:var(--text);border-radius:14px;padding:13px 12px;font-size:16px}label{display:block;color:var(--muted);font-size:13px;margin:10px 0 6px}
.smallbtn{border:1px solid var(--line);background:white;border-radius:13px;padding:10px 12px;color:var(--text);font-weight:700}.smallbtn.danger{color:var(--danger)}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}h2{margin:0;font-size:18px}
.timeline{display:flex;height:34px;border-radius:14px;overflow:hidden;background:#eee2d7;border:1px solid var(--line)}.seg{min-width:4px}.empty{color:var(--muted);text-align:center;padding:22px 8px}
.log{border-top:1px solid var(--line);padding:12px 0}.log:first-child{border-top:0}.log-main{display:flex;gap:10px;align-items:flex-start}.swatch{width:18px;height:18px;border-radius:6px;flex:0 0 auto;margin-top:3px}.log-title{font-weight:800;margin-bottom:3px}.meta{color:var(--muted);font-size:13px;line-height:1.55}.actions{margin-top:9px;display:flex;gap:8px;flex-wrap:wrap}
.summary-line{display:flex;align-items:center;gap:8px;margin:9px 0}.bar-wrap{flex:1;height:12px;border-radius:999px;background:#eee2d7;overflow:hidden}.bar{height:100%;border-radius:999px}
dialog{border:0;border-radius:22px;padding:0;width:min(92vw,520px);box-shadow:0 24px 80px rgba(0,0,0,.25)}dialog::backdrop{background:rgba(43,33,26,.35)}.dialog-inner{padding:18px;background:var(--card)}.dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.hint,.install{font-size:13px;color:var(--muted);line-height:1.6}.install{display:none;margin-top:10px;background:#fff;border:1px dashed #cdbdad;border-radius:16px;padding:12px;text-align:left}
</style>
</head>
<body>
<div class="app">
<header><h1>作業記録</h1><div class="sub">色で時間の塊を残して、あとから思い出すための記録アプリです。</div><div class="install" id="installHint">iPhoneではSafariで開いて、共有ボタンから「ホーム画面に追加」を選ぶとアプリみたいに使えます。</div></header>
<section class="card now"><div class="status" id="status">色を選んでスタート</div><div class="timer" id="timer">00:00:00</div><div class="colors" id="colorPicker"></div><button class="bigbtn" id="mainBtn">▶ スタート</button><div id="afterStop" style="display:none;text-align:left;margin-top:14px;"><label>今の時間、何してた？ 後で空欄でもOK</label><input id="taskInput" placeholder="例：漫画、仕事、SNS、休憩"><div class="row" style="margin-top:10px;"><button class="smallbtn" id="saveTaskBtn">保存</button><button class="smallbtn" id="skipTaskBtn">未入力で保存</button></div></div></section>
<section class="card"><div class="section-title"><h2>今日の時間ブロック</h2><button class="smallbtn danger" id="clearBtn">今日を全削除</button></div><div class="timeline" id="timeline"></div><p class="hint">色の塊を見て「あ、この時間あれやってたな」を思い出す用です。</p></section>
<section class="card"><div class="section-title"><h2>タスク別 合計</h2></div><div id="summary"></div></section>
<section class="card"><div class="section-title"><h2>今日の履歴</h2></div><div id="logs"></div></section>
</div>
<dialog id="editDialog"><div class="dialog-inner"><h2>記録を編集</h2><label>何してた？</label><input id="editTask"><label>色</label><div class="colors" id="editColors"></div><div class="dialog-actions"><button class="smallbtn" id="cancelEdit">閉じる</button><button class="smallbtn" id="saveEdit">保存</button></div></div></dialog>
<script>
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}
const colors=["#4F8EF7","#54B689","#F2C94C","#EB5757","#9B51E0","#F2994A","#56CCF2","#6FCF97","#BB6BD9","#2D9CDB","#8D6E63","#333333"];
const STORAGE="simple_work_timer_logs_v2";let logs=JSON.parse(localStorage.getItem(STORAGE)||"[]");let running=JSON.parse(localStorage.getItem("running_timer_v2")||"null");let selectedColor=colors[0],pendingLogId=null,editId=null,editColor=colors[0];const $=id=>document.getElementById(id);
const isStandalone=window.navigator.standalone||window.matchMedia("(display-mode: standalone)").matches;if(!isStandalone)$("installHint").style.display="block";
function pad(n){return String(n).padStart(2,"0")}function fmtTime(ts){const d=new Date(ts);return `${pad(d.getHours())}:${pad(d.getMinutes())}`}function fmtDuration(ms){const s=Math.max(0,Math.floor(ms/1000)),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;if(h)return `${h}時間${m}分`;if(m)return `${m}分${sec}秒`;return `${sec}秒`}function fmtTimer(ms){const s=Math.max(0,Math.floor(ms/1000));return `${pad(Math.floor(s/3600))}:${pad(Math.floor((s%3600)/60))}:${pad(s%60)}`}function todayKey(ts=Date.now()){const d=new Date(ts);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}function save(){localStorage.setItem(STORAGE,JSON.stringify(logs))}function saveRunning(){running?localStorage.setItem("running_timer_v2",JSON.stringify(running)):localStorage.removeItem("running_timer_v2")}
function renderColorPicker(){$("colorPicker").innerHTML=colors.map(c=>`<button class="color ${c===selectedColor?'selected':''}" style="background:${c}" data-color="${c}"></button>`).join("");$("colorPicker").querySelectorAll(".color").forEach(btn=>btn.onclick=()=>{selectedColor=btn.dataset.color;renderColorPicker()})}
function renderEditColors(){$("editColors").innerHTML=colors.map(c=>`<button class="color ${c===editColor?'selected':''}" style="background:${c}" data-color="${c}"></button>`).join("");$("editColors").querySelectorAll(".color").forEach(btn=>btn.onclick=()=>{editColor=btn.dataset.color;renderEditColors()})}
function todayLogs(){return logs.filter(l=>todayKey(l.start)===todayKey()).sort((a,b)=>b.start-a.start)}
function renderTimeline(){const list=todayLogs().slice().reverse(),box=$("timeline");if(!list.length){box.innerHTML=`<div class="empty" style="width:100%;">まだ記録なし</div>`;return}const total=list.reduce((sum,l)=>sum+(l.end-l.start),0)||1;box.innerHTML=list.map(l=>`<div class="seg" style="width:${Math.max(2,(l.end-l.start)/total*100)}%;background:${l.color}"></div>`).join("")}
function renderSummary(){const list=todayLogs(),summary={};list.forEach(l=>{const name=l.task||"未入力";summary[name]=(summary[name]||0)+(l.end-l.start)});const entries=Object.entries(summary).sort((a,b)=>b[1]-a[1]),total=entries.reduce((s,e)=>s+e[1],0)||1;if(!entries.length){$("summary").innerHTML=`<div class="empty">まだ集計なし</div>`;return}$("summary").innerHTML=entries.map(([name,ms])=>{const sample=list.find(l=>(l.task||"未入力")===name),pct=ms/total*100;return `<div class="summary-line"><span class="swatch" style="background:${sample.color}"></span><div style="width:92px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(name)}</div><div class="bar-wrap"><div class="bar" style="width:${pct}%;background:${sample.color}"></div></div><div class="meta" style="width:72px;text-align:right;">${fmtDuration(ms)}</div></div>`}).join("")}
function renderLogs(){const list=todayLogs();if(!list.length){$("logs").innerHTML=`<div class="empty">まだ履歴なし</div>`;return}$("logs").innerHTML=list.map(l=>`<div class="log"><div class="log-main"><span class="swatch" style="background:${l.color}"></span><div style="flex:1;"><div class="log-title">${escapeHtml(l.task||"未入力")}</div><div class="meta">${fmtTime(l.start)}〜${fmtTime(l.end)} / ${fmtDuration(l.end-l.start)}</div><div class="actions"><button class="smallbtn" onclick="openEdit('${l.id}')">編集</button><button class="smallbtn danger" onclick="deleteLog('${l.id}')">削除</button></div></div></div></div>`).join("")}
function renderAll(){renderColorPicker();renderTimeline();renderSummary();renderLogs();updateRunningView()}function updateRunningView(){if(running){$("status").textContent=`計測中：${fmtTime(running.start)}開始`;$("timer").textContent=fmtTimer(Date.now()-running.start);$("mainBtn").textContent="■ ストップ";$("mainBtn").classList.add("stop");$("colorPicker").style.opacity=.5}else{$("status").textContent="色を選んでスタート";$("timer").textContent="00:00:00";$("mainBtn").textContent="▶ スタート";$("mainBtn").classList.remove("stop");$("colorPicker").style.opacity=1}}
function startTimer(){running={start:Date.now(),color:selectedColor};saveRunning();$("afterStop").style.display="none";updateRunningView()}function stopTimer(){const now=Date.now(),log={id:String(now),start:running.start,end:now,color:running.color,task:""};logs.push(log);save();running=null;saveRunning();pendingLogId=log.id;$("taskInput").value="";$("afterStop").style.display="block";renderAll()}
$("mainBtn").onclick=()=>running?stopTimer():startTimer();$("saveTaskBtn").onclick=()=>{const l=logs.find(x=>x.id===pendingLogId);if(l)l.task=$("taskInput").value.trim();pendingLogId=null;$("afterStop").style.display="none";save();renderAll()};$("skipTaskBtn").onclick=()=>{pendingLogId=null;$("afterStop").style.display="none";renderAll()};
$("clearBtn").onclick=()=>{if(confirm("今日の記録を全部削除しますか？")){const key=todayKey();logs=logs.filter(l=>todayKey(l.start)!==key);save();renderAll()}};
window.openEdit=function(id){const l=logs.find(x=>x.id===id);if(!l)return;editId=id;editColor=l.color;$("editTask").value=l.task||"";renderEditColors();$("editDialog").showModal()}
window.deleteLog=function(id){if(confirm("この記録を削除しますか？")){logs=logs.filter(l=>l.id!==id);save();renderAll()}}
$("cancelEdit").onclick=()=>$("editDialog").close();$("saveEdit").onclick=()=>{const l=logs.find(x=>x.id===editId);if(l){l.task=$("editTask").value.trim();l.color=editColor;save()}$("editDialog").close();renderAll()};
function escapeHtml(str){return String(str).replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]))}
setInterval(updateRunningView,1000);renderAll();
</script>
</body>
</html>
